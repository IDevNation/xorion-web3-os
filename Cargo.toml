[workspace]
members = [".", "xos-scheme", "xos-gui", "xos-runtime", "xos-privacy", "xos-storage", "xos-governance"]

[package]
name = "xos-sdk"
repository = "https://github.com/IDevNation/xos-web3-os"
version = "1.0.0"
edition = "2021"
description = "Multi-chain wallet SDK for X-OS Web3 OS"
license = "MIT"

[dependencies]
# Phase 1 — wallet & key derivation
bip39 = "2.0"
bip32 = "0.5"
secp256k1 = { version = "0.28", features = ["rand"] }
sha3 = "0.10"
hex = "0.4"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
zeroize = { version = "1.6", features = ["derive"] }
log = "0.4"

# Phase 2 — RPC & transaction broadcasting
tokio = { version = "1.35", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
serde_json = "1.0"
async-trait = "0.1"

# Phase 3 — smart contract interaction
ethabi = "18.0"
tiny-keccak = { version = "2.0", features = ["keccak"] }

[dev-dependencies]
xos-core = { path = "xos-runtime" }
xos-zk = { path = "xos-privacy" }
xos-ipfs = { path = "xos-storage" }
xos-governance = { path = "xos-governance" }
tempfile = "3.8"

[[example]]
name = "demo"
path = "examples/demo.rs"

[[example]]
name = "rpc_demo"
path = "examples/rpc_demo.rs"

[[example]]
name = "contract_demo"
path = "examples/contract_demo.rs"

[[example]]
name = "kernel_demo"
path = "examples/kernel_demo.rs"

[[example]]
name = "simple_wallet"
path = "examples/simple_wallet.rs"

[[example]]
name = "dao_voting"
path = "examples/dao_voting.rs"

[[example]]
name = "ipfs_upload"
path = "examples/ipfs_upload.rs"

[[example]]
name = "private_transfer"
path = "examples/private_transfer.rs"
